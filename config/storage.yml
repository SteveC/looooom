test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

r2:
  service: S3
  access_key_id: <%= ENV["R2_ACCESS_KEY_ID"] %>
  secret_access_key: <%= ENV["R2_SECRET_ACCESS_KEY"] %>
  region: auto
  bucket: <%= ENV["R2_BUCKET"] %>
  <% cloudflare_account_id = ENV["CLOUDFLARE_ACCOUNT_ID"].presence %>
  endpoint: <%= "https://#{cloudflare_account_id}.r2.cloudflarestorage.com" if cloudflare_account_id.present? %>
  force_path_style: true
  request_checksum_calculation: when_required
  response_checksum_validation: when_required

# Example AWS S3 configuration. Use environment variables rather than Rails credentials in this public repository.
